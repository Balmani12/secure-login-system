<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Secure Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
          padding: 40px; width: 100%; max-width: 420px; }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo span { font-size: 36px; }
  h2 { color: #f1f5f9; font-size: 22px; text-align: center; margin-bottom: 6px; }
  .sub { color: #94a3b8; font-size: 13px; text-align: center; margin-bottom: 24px; }
  label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 5px; font-weight: 500; }
  input { width: 100%; padding: 11px 14px; background: #0f172a; border: 1px solid #334155;
          border-radius: 8px; color: #f1f5f9; font-size: 14px; margin-bottom: 16px; outline: none; }
  input:focus { border-color: #3b82f6; }
  .btn { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none;
         border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .btn:hover { background: #2563eb; }
  .link { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 13px; }
  .link a { color: #3b82f6; text-decoration: none; }
  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  .flash.error   { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  .flash.success { background: #052e16; color: #86efac; border: 1px solid #14532d; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>🔐</span></div>
  <h2>Welcome Back</h2>
  <p class="sub">Login to your secure account</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter your username" required autocomplete="off">

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>

    <button type="submit" class="btn">Login</button>
  </form>

  <div class="link">Don't have an account? <a href="/register">Register here</a></div>
</div>
</body>
</html>
