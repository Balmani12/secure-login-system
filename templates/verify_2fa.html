<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify 2FA - Secure Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
          padding: 40px; width: 100%; max-width: 400px; text-align: center; }
  h2 { color: #f1f5f9; font-size: 20px; margin-bottom: 8px; }
  .sub { color: #94a3b8; font-size: 13px; margin-bottom: 28px; }
  label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 8px;
          font-weight: 500; text-align: left; }
  input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155;
          border-radius: 8px; color: #f1f5f9; font-size: 24px; text-align: center;
          letter-spacing: .3em; outline: none; margin-bottom: 16px; }
  input:focus { border-color: #3b82f6; }
  .btn { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none;
         border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #2563eb; }
  .back { display: block; margin-top: 16px; color: #64748b; font-size: 13px; text-decoration: none; }
  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  .flash.error { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:40px;margin-bottom:16px">📱</div>
  <h2>Two-Factor Verification</h2>
  <p class="sub">Enter the 6-digit code from your Google Authenticator app.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <label>Authentication Code</label>
    <input type="text" name="otp" maxlength="6" placeholder="000000" required autofocus autocomplete="off">
    <button type="submit" class="btn">Verify</button>
  </form>

  <a href="/login" class="back">Back to login</a>
</div>
</body>
</html>
